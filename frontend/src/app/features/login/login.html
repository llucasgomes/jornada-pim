 <div class="relative min-h-screen flex items-center justify-center p-4 overflow-hidden bg-[#0f172a]">
      <div class="relative z-10 w-full max-w-md p-8 bg-slate-900 border border-slate-700 rounded-3xl shadow-2xl animate-in fade-in slide-in-from-bottom-4 duration-700">
        <div class="text-center mb-8">
          <div class="flex justify-center mb-4">
            <div class="w-14 h-14 flex items-center justify-center text-indigo-500 shrink-0">
              <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
                <path d="M24 4L4 14V34L24 44L44 34V14L24 4Z" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
                <path d="M24 14V34" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                <path d="M14 19L24 14L34 19" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
          <h1 class="text-3xl font-bold text-white">JornadaPIM</h1>
          <p class="text-slate-400 text-sm mt-1">Controle de Ponto Digital</p>
        </div>

        <form (ngSubmit)="onLogin()" class="space-y-5">
          <div class="space-y-2">
            <label for="matricula" class="text-sm font-medium text-slate-400 ml-1">Matrícula</label>
            <input
              id="matricula"
              class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-slate-200 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all"
              type="text"
              placeholder="Ex: PIM-0001"
              [(ngModel)]="matricula"
              name="matricula"
              required
              autocomplete="username"
            />
          </div>

          <div class="space-y-2">
            <label for="senha" class="text-sm font-medium text-slate-400 ml-1">Senha</label>
            <input
              id="senha"
              class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-slate-200 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all"
              type="password"
              placeholder="Digite sua senha"
              [(ngModel)]="senha"
              name="senha"
              required
              autocomplete="current-password"
            />
          </div>

          @if (error()) {
            <div class="flex items-center gap-2 p-3 bg-red-500/10 border border-red-500/30 text-red-300 text-sm rounded-xl animate-in fade-in duration-300">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              {{ error() }}
            </div>
          }

          <button
            type="submit"
            class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-lg shadow-indigo-500/25 active:scale-[0.98] transition-all disabled:opacity-50 disabled:pointer-events-none"
            [disabled]="loading()"
          >
            @if (loading()) {
              <div class="flex items-center justify-center gap-2">
                <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                <span>Entrando...</span>
              </div>
            } @else {
              Entrar
            }
          </button>
        </form>

        <div class="mt-8 text-center">
          <p class="text-xs text-slate-500 uppercase tracking-widest opacity-60">Polo Industrial de Manaus</p>
        </div>
      </div>
    </div>
