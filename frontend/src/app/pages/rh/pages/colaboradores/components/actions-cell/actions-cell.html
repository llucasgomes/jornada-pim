<div class="flex items-center gap-3">
  <!-- Visualizar -->
  <app-dialog
    zTitle="Detalhes do colaborador"
    zDescription="Informações do colaborador selecionado."
    [zContent]="VisualizarColaborador"

    [zData]="colaborador"
    [zHideFooter]="true"
    zWidth="480px"
  >
    <z-button class="cursor-pointer" zType="ghost" zSize="icon-sm">
      <ng-icon name="lucideEye" class="size-4" />
    </z-button>
  </app-dialog>

  <!-- Editar -->
   <app-dialog
   zTitle="Editar Colaborador"
  zDescription="Altere as informações abaixo e clique em salvar."
  [zContent]="EditarColaborador"
  [zData]="colaborador"
  zOkText="Salvar Alterações"
  zCancelText="Cancelar"
  [zOnOk]="onEditar"
  >
   <z-button
   class="cursor-pointer"
   zType="ghost"
   [zLoading]="atualizarMutation.isPending()"
  [zDisabled]="atualizarMutation.isPending()"
   zSize="icon-sm"
   >
    <ng-icon name="lucidePencil" class="size-4" />
  </z-button>
  </app-dialog>


  <z-button class="cursor-pointer" zType="ghost" zSize="icon-sm" (click)="onExcluir()">
    <ng-icon name="lucideTrash2" class="size-4 text-destructive" />
  </z-button>
</div>
