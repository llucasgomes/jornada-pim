<div class="">
  <header class="mb-8  flex">
   <div class="flex-1">
     <h1 class="text-3xl font-bold text-foreground">Lista de Colaboradores da Empresa</h1>
    <p class="text-muted-foreground text-sm mt-1">Acompanhamento em tempo real da equipe</p>
   </div>

    <app-dialog
    zTitle="Detalhes do colaborador"
    zDescription="Informações do colaborador selecionado."
    [zContent]="CriarColaborador"

    [zData]="CriarColaborador"
    [zHideFooter]="true"
    zWidth="480px"
  >
      <div class="flex items-center gap-3">
        <z-button 
          class="cursor-pointer flex gap-3 w-auto" 
          zType="outline" 
          zSize="lg"
          [zLoading]="isGerandoPdfTodos"
          [zDisabled]="isGerandoPdfTodos"
          (click)="onGerarPdfTodos()"
        >
          <ng-icon name="lucideFileText" class="size-4" />
          <span>Gerar Espelhos (Mês)</span>
        </z-button>
        
        <z-button class="cursor-pointer flex gap-3 w-auto" zType="secondary" zSize="lg">
          <ng-icon name="lucidePlusCircle" class="size-4" />
          <span>Novo Colaborador</span>
        </z-button>
      </div>
  </app-dialog>


  </header>

  @if (colaboradoresQuery.isPending()) {
    <z-loader />
  } @else if (colaboradoresQuery.isError()) {
    <div class="text-destructive py-4 text-center">Erro ao carregar colaboradores.</div>
  } @else if (colaboradoresQuery.data()?.length) {
    <app-table
      [data]="colaboradoresQuery.data()!"
      [columns]="columns"
      [paginate]="true"
      [pageSize]="10"
    />
  } @else {
    <z-empty
      zIcon="lucideUsers"
      zTitle="Nenhum colaborador encontrado"
      zDescription="Não há colaboradores cadastrados. Adicione um novo colaborador para começar."
    />
  }
</div>
