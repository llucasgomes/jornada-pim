<div class="w-full">
  <header class="mb-8">
    <h1 class="text-3xl font-bold text-foreground">Lista de Equipe</h1>
    <p class="text-muted-foreground text-sm mt-1">Acompanhamento em tempo real da equipe</p>
  </header>

  @if (colaboradores().length > 0) {
    <app-table
      [data]="colaboradores()"
      [columns]="columns"
      [paginate]="true"
      [pageSize]="5"
    ></app-table>
  } @else {
    <z-empty
      zIcon="lucideUsers"
      zTitle="Nenhum colaborador encontrado"
      zDescription="Não há colaboradores cadastrados neste setor. Adicione um novo colaborador para começar."
    />
  }
</div>
