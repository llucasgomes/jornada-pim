<z-card>
  <h3 class="text-sm text-slate-400 mb-4">{{ title }}</h3>

  <div class="flex flex-col gap-4">
    @for (user of fiveTopAtrasados || []; track user.nome) {
      <div class="flex items-center gap-3">
        <!-- FOTO -->
        <img
          [src]="user.imageUrl || 'https://i.pravatar.cc/40'"
          alt="Foto do colaborador"
          [attr.aria-label]="'Foto de ' + (user.nome || 'colaborador')"
          [title]="user.nome"
          class="w-10 h-10 rounded-full object-cover"
        />

        <!-- INFO -->
        <div class="flex-1">
          <div class="text-sm text-white font-medium">
            {{ user.nome }}
          </div>
          <div class="text-xs text-slate-500">{{ user.cargo }} • {{ user.setor }}</div>
        </div>

        <!-- ATRASO -->
        <span class="text-red-400 text-sm font-mono"> {{ user.total }}m </span>
      </div>
    }
  </div>
</z-card>
