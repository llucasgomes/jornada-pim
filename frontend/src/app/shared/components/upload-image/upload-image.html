<div class="space-y-1">
  <div
    class="relative w-24 h-24 cursor-pointer"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave()"
    (drop)="onDrop($event)"
  >
    <!-- Input invisível cobre todo o container -->
    <input
      #fileInput
      type="file"
      accept="image/*"
      class="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-10"
      (change)="onFileSelected($event)"
    />

   <!-- Avatar sempre visível -->
@if (previewUrl()) {
  <!-- blob URL: usa img direto sem NgOptimizedImage -->
  <div class="size-24 rounded-md overflow-hidden">
    <img
      [src]="previewUrl()"
      alt="Foto do colaborador"
      class="w-full h-full object-cover rounded-md"
    />
  </div>
} @else {
  <!-- sem foto: usa z-avatar com imagem default -->
  <z-avatar
    zSize="3xl"
    zShape="rounded"
    zSrc="/assets/images/avatar_image.jpg"
    zAlt="Foto do colaborador"
  />
}

    <!-- Overlay de troca ao hover -->
    <div
      class="absolute inset-0 rounded-md bg-black/50 opacity-0 hover:opacity-100 transition-opacity flex flex-col items-center justify-center gap-1 z-20"
      (click)="fileInput.click()"
    >
      <ng-icon name="lucideCamera" class="text-white size-5" />
      <p class="text-[11px] text-white font-medium text-center leading-tight">
        {{ previewUrl() ? 'Trocar' : 'Adicionar' }}
      </p>
    </div>

    <!-- Botão remover (só aparece se tiver foto) -->
    @if (previewUrl()) {
      <button
        type="button"
        title="Remover foto"
        class="absolute -top-1.5 -right-1.5 z-30 bg-black/60 hover:bg-red-600 text-white rounded-full w-5 h-5 flex items-center justify-center transition-colors"
        (click)="removeFile(); $event.stopPropagation()"
      >
        <ng-icon name="lucideX" class="size-3" />
      </button>
    }
  </div>
</div>
