<div class="space-y-1">
  <div
    class="relative w-36 h-36 rounded-lg overflow-hidden border border-dashed border-slate-600 cursor-pointer transition-all"
    [class.border-solid]="previewUrl()"
    [class.border-slate-500]="isDragging()"
    [class.bg-slate-700]="isDragging()"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave()"
    (drop)="onDrop($event)"
  >
    <!-- Input invisível cobre todo o container -->
    <input
      #fileInput
      type="file"
      accept="image/*"
      class="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-10"
      (change)="onFileSelected($event)"
    />

    <!-- Estado vazio -->
    @if (!previewUrl()) {
      <div class="absolute inset-0 flex flex-col items-center justify-center gap-2 pointer-events-none">
        <ng-icon name="lucideUpload" class="text-slate-500 size-5" />
        <p class="text-[11px] font-bold uppercase tracking-widest text-slate-500 text-center">
          Click to upload or drag & drop
        </p>
      </div>

    <!-- Preview da imagem -->
    } @else {
      <img
        [src]="previewUrl()"
        alt="Foto do colaborador"
        class="absolute inset-0 w-full h-full object-cover"
      />
      <!-- Overlay de troca ao hover -->
      <div class="absolute inset-0 bg-black/50 opacity-0 hover:opacity-100 transition-opacity flex flex-col items-center justify-center gap-1 z-20"
           (click)="fileInput.click()">
        <ng-icon name="lucideCamera" class="text-white size-5" />
        <p class="text-[11px] text-white font-medium">Trocar foto</p>
      </div>
      <!-- Botão remover -->
      <button
        type="button"
        title="Remover foto"
        class="absolute top-1.5 right-1.5 z-30 bg-black/60 hover:bg-red-600 text-white rounded-full w-6 h-6 flex items-center justify-center transition-colors"
        (click)="removeFile(); $event.stopPropagation()"
      >
        <ng-icon name="lucideX" class="size-3" />
      </button>
    }
  </div>
</div>
